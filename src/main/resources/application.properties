server.port=${PORT:8080}

# Database Configurations (defaults to H2, overrides with environment variables for production PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:splitwise;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (for local debugging/inspection)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

