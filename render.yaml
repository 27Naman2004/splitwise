services:
  - type: web
    name: splitwise-backend
    runtime: java
    plan: free
    region: singapore
    branch: main
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/splitwise-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_H2_CONSOLE_ENABLED
        value: "false"
